<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Parent Portal</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/script.js"></script>

</head>

<body>

<div class="login-box">

    <img src="images/logo.png" class="logo" alt="School Logo">

    <h1>Student Parent Portal</h1>

    <p class="school-name">Narmada School</p>

    <input type="text" id="name" placeholder="Full Name">

    <select id="class">

        <option value="">Select Class</option>

        <option value="6">Class 6</option>
        <option value="7">Class 7</option>
        <option value="8">Class 8</option>
        <option value="9">Class 9</option>
        <option value="10">Class 10</option>
        <option value="11">Class 11</option>
        <option value="12">Class 12</option>

    </select>

    <input type="number" id="roll" placeholder="Roll Number">

    <input type="tel" id="phone" placeholder="Phone Number">

    <input type="text" id="id" placeholder="Student ID">

    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="note">

        Enter all the details correctly.

    </p>

</div>

</body>

</html>
