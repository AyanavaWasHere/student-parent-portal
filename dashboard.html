<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{
            background:#eaf3ff;
            display:block;
            padding:20px;
        }

        .dashboard{
            max-width:500px;
            margin:auto;
        }

        .welcome{
            background:royalblue;
            color:white;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
        }

        .card{

            background:white;

            padding:20px;

            margin-bottom:15px;

            border-radius:12px;

            text-align:center;

            font-size:20px;

            cursor:pointer;

            box-shadow:0 5px 12px rgba(0,0,0,0.2);
        }

        .card:hover{
            background:#eef4ff;
        }

    </style>

</head>

<body>

<div class="dashboard">

<div class="welcome">

<h2>Welcome, Ayanava 👋</h2>

<p>Student ID : 24001</p>

</div>

<div class="card">👤 Student Profile</div>

<div class="card">📊 Marks</div>

<div class="card">📅 Attendance</div>

<div class="card">📚 Homework</div>

<div class="card">📢 Notices</div>

<div class="card">💰 Fees</div>

<div class="card">☎ Contact School</div>

<div class="card">🚪 Logout</div>

</div>

</body>

</html>
